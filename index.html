<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ritam Axis | Luxury Residential Interior Design</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --fill-level: 250px;
        }

        body {
            margin: 0;
            background: #0d0d0d;
        }

        #wave-preloader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #0d0d0d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', Gadget, sans-serif;
            transition: opacity 0.7s ease-in-out;
        }

        #wave-preloader.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .svg-container {
            width: 90%;
            max-width: 1000px;
        }

        .bg-text {
            fill: #222;
            font-size: 110px;
            font-weight: 900;
            letter-spacing: 2px;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        .wave-group {
            transform: translateY(var(--fill-level));
            transition: transform 0.1s linear;
            will-change: transform;
        }

        .wave-path {
            fill: #D4AF37;
            animation: wave-flow 2s linear infinite;
            will-change: transform;
        }

        @keyframes wave-flow {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-400px);
            }
        }

        .percent-text {
            margin-top: 30px;
            color: #888;
            font-size: 1.5rem;
            letter-spacing: 5px;
            font-weight: bold;
            font-family: 'Arial Black', Gadget, sans-serif;
        }
    </style>
</head>

<body>

    <!-- ═══ WAVE LOADER (fixed overlay on top — shows instantly) ═══ -->
    <div id="wave-preloader">
        <div class="svg-container">
            <svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
                <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="bg-text">
                    RITAM AXIS
                </text>
                <defs>
                    <mask id="text-mask">
                        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="110"
                            font-weight="900" fill="white"
                            style="font-family:'Arial Black',Gadget,sans-serif; letter-spacing:2px;">
                            RITAM AXIS
                        </text>
                    </mask>
                </defs>
                <g mask="url(#text-mask)">
                    <g class="wave-group">
                        <path class="wave-path"
                            d="M0 0 Q 100 -40 200 0 T 400 0 T 600 0 T 800 0 T 1000 0 T 1200 0 T 1400 0 V 400 H 0 Z" />
                    </g>
                </g>
            </svg>
        </div>
        <div class="percent-text" id="progress">LOADING... 0%</div>
    </div>

    <script>
        (function () {
            var display = document.getElementById("progress");
            var root = document.documentElement;
            var startY = 220;
            var endY = 40;
            var duration = 5000;
            var startTime = null;

            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                var elapsed = timestamp - startTime;
                var progress = Math.min(Math.floor((elapsed / duration) * 100), 100);

                display.innerText = progress < 100 ? "LOADING... " + progress + "%" : "COMPLETED";

                var currentY = startY - ((progress / 100) * (startY - endY));
                root.style.setProperty('--fill-level', currentY + 'px');

                if (progress < 100) {
                    requestAnimationFrame(animate);
                } else {
                    root.style.setProperty('--fill-level', '0px');
                    // Fade out the preloader overlay — site is already loaded underneath
                    setTimeout(function () {
                        var preloader = document.getElementById('wave-preloader');
                        if (preloader) {
                            preloader.classList.add('fade-out');
                            setTimeout(function () {
                                preloader.remove();
                            }, 700);
                        }
                    }, 500);
                }
            }

            requestAnimationFrame(animate);
        })();
    </script>

    <!-- ═══ REACT APP (loads immediately underneath the preloader overlay) ═══ -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

</body>

</html>
